<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="YouMe">
  <defs>
    <linearGradient id="youme-bg" x1="10" y1="6" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6d5ef7"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="youme-shine" x1="18" y1="14" x2="46" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="youme-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="17" fill="url(#youme-bg)"/>
  <rect x="4" y="4" width="56" height="56" rx="17" fill="url(#youme-shine)" opacity="0.18"/>
  <!-- Two people (profile circles) -->
  <circle cx="22.5" cy="25" r="8.5" fill="#ffffff" fill-opacity="0.93"/>
  <circle cx="41.5" cy="25" r="8.5" fill="#ffffff" fill-opacity="0.78"/>
  <!-- Connection + heart -->
  <path
    d="M22 34.5c0 4.2 3.2 7.8 10 11.2 6.8-3.4 10-7 10-11.2 0-2.8-2.2-5-5-5-1.6 0-3 .9-5 3.1-2-2.2-3.4-3.1-5-3.1-2.8 0-5 2.2-5 5z"
    fill="#ffffff"
    fill-opacity="0.96"
    filter="url(#youme-glow)"
  />
  <!-- Spark (match moment) -->
  <path
    d="M32 11.5 33.1 15.2 36.8 15.2 33.9 17.4 34.9 21.1 32 18.8 29.1 21.1 30.1 17.4 27.2 15.2 30.9 15.2Z"
    fill="#fde68a"
  />
  <circle cx="32" cy="48.5" r="2" fill="#ffffff" fill-opacity="0.55"/>
</svg>
