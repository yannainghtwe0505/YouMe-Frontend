# Frontend-only repository: this file is under frontend/.github/workflows/ (committable when git root = frontend).
#
# Secrets: DOCKER_USERNAME, DOCKER_PASSWORD, EC2_IP, EC2_KEY
# Optional: EC2_USER, EC2_DEPLOY_DIR, EC2_SSH_KNOWN_HOSTS, PUBLIC_APP_URL, WS_URL
# EC2 must have docker, compose, and docker-compose.prod.yml + .env in EC2_DEPLOY_DIR
# (same as backend deploy; you can keep one clone of a monorepo or copy compose from backend repo).

name: Deploy Frontend

on:
  push:
    branches: [main]

env:
  IMAGE: yannainghtwe/youme-frontend:latest

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🧪 (Optional but recommended)
      - name: Install deps & test
        run: |
          npm ci
          npm run build   # or npm test if you have tests

      # 🐳 Build Docker image
      - name: Build image
        run: |
          docker build -t $IMAGE .

      # 🔐 Login Docker Hub
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 📦 Push image
      - name: Push image
        run: docker push $IMAGE

      # 🔑 SSH setup
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 🚀 Deploy (your step — correct)
      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${{ secrets.EC2_USER }}@${{ secrets.EC2_IP }}" << 'EOF'
            set -e
            cd ~/dating-app

            echo "🐳 Pull latest frontend image..."
            docker pull yannainghtwe/youme-frontend:latest

            echo "🚀 Restart frontend..."
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend

            echo "✅ Done"
          EOF
